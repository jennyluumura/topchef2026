name: Update Top Chef Scores

on:
  schedule:
    - cron: '0 14 * * 2'  # Every Tuesday at 10am ET (14:00 UTC)
  workflow_dispatch:        # Also allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to commit updated index.html back to repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run score updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_scores.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update scores $(date +'%Y-%m-%d')"
          git push
